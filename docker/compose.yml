name: chat_app

services:
  postgres:
    image: postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

    env_file:
      - ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ..
      dockerfile: docker/dockerfile
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health/ || exit 1"]
      interval: 30s
      timeout: 30s
      retries: 5
      start_period: 30s
    entrypoint: /chat_app/docker/entrypoint.sh
    environment:
      RUN_MIGRATIONS: "1"
      DJANGO_SETTINGS_MODULE: config.settings.production
    command: >
      gunicorn config.asgi:application
      -k uvicorn.workers.UvicornWorker
      --bind 0.0.0.0:8000
      --workers 4
    volumes:
      - type: bind
        source: ..
        target: /chat_app
      - static_volume:/chat_app/staticfiles
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_worker:
    build:
      context: ..
      dockerfile: docker/dockerfile
    entrypoint: /chat_app/docker/entrypoint.sh
    environment:
      RUN_MIGRATIONS: "0"
    command: >
      celery -A config worker
      --loglevel=info
      --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  celery_beat:
    build:
      context: ..
      dockerfile: docker/dockerfile
    entrypoint: /chat_app/docker/entrypoint.sh
    environment:
      RUN_MIGRATIONS: "0"
    command: >
      celery -A config beat
      --loglevel=info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "8084:80"
    volumes:
     - ../docker/nginx.conf:/etc/nginx/nginx.conf
     - static_volume:/chat_app/staticfiles
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
  static_volume:
